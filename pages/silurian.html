<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>志留纪｜地球历史</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <a class="back-rail" href="paleozoic.html" aria-label="返回古生代页面" style="opacity:0; transition: opacity 0.15s ease-out;"><span>返回古生代</span></a>
  <main class="image-page" aria-label="志留纪">
    <div class="image-stage" id="mainStage">
      <picture>
        <img
          src="../images/optimized/silurian-period.webp"
          alt="志留纪信息图"
          loading="eager"
          decoding="async"
          fetchpriority="high"
        />
      </picture>
    </div>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const stage = document.getElementById('mainStage');
      const img = stage.querySelector('img');
      const backRail = document.querySelector('.back-rail');

      function revealImage() {
        img.classList.add('loaded');
        stage.classList.add('loaded');
        if (backRail) {
          backRail.style.opacity = '1';
        }
      }

      if (img.complete && img.naturalHeight !== 0) {
        requestAnimationFrame(revealImage);
      } else {
        img.addEventListener('load', function onLoad() {
          img.removeEventListener('load', onLoad);
          requestAnimationFrame(revealImage);
        });
      }
    });
  </script>
</body>
</html>
