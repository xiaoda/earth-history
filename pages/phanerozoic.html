﻿<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>显生宙｜地球历史</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <a class="back-rail" href="../index.html" aria-label="返回地球历史首页" style="opacity:0; transition: opacity 0.15s ease-out;"><span>返回地球历史</span></a>
  <main class="image-page" aria-label="显生宙">
    <div class="image-stage" id="mainStage">
      <picture>
        <img
          src="../images/optimized/phanerozoic-eon.webp"
          alt="显生宙全屏图"
          loading="eager"
          decoding="async"
          fetchpriority="high"
        />
      </picture>
      <svg class="hotspots" viewBox="0 0 1672 941" aria-label="显生宙页面链接" style="opacity:0; transition: opacity 0.15s ease-out;">
        <a href="paleozoic.html" aria-label="进入古生代页面">
          <rect x="333" y="97" width="455" height="27" />
        </a>
        <a href="mesozoic.html" aria-label="进入中生代页面">
          <rect x="789" y="97" width="411" height="27" />
        </a>
        <a href="cenozoic.html" aria-label="进入新生代页面">
          <rect x="1201" y="97" width="466" height="27" />
        </a>
        <a href="cambrian.html" aria-label="进入寒武纪页面">
          <rect x="73" y="126" width="129" height="38" />
        </a>
        <a href="ordovician.html" aria-label="进入奥陶纪页面">
          <rect x="202" y="126" width="101" height="38" />
        </a>
        <a href="silurian.html" aria-label="进入志留纪页面">
          <rect x="319" y="126" width="120" height="38" />
        </a>
        <a href="devonian.html" aria-label="进入泥盆纪页面">
          <rect x="439" y="126" width="112" height="38" />
        </a>
        <a href="carboniferous.html" aria-label="进入石炭纪页面">
          <rect x="551" y="126" width="128" height="38" />
        </a>
        <a href="permian.html" aria-label="进入二叠纪页面">
          <rect x="679" y="126" width="109" height="38" />
        </a>
      </svg>
    </div>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const stage = document.getElementById('mainStage');
      const img = stage.querySelector('img');
      const backRail = document.querySelector('.back-rail');
      const hotspots = stage.querySelector('.hotspots');
      
      function revealImage() {
        img.classList.add('loaded');
        stage.classList.add('loaded');
        if (backRail) backRail.style.opacity = '1';
        if (hotspots) hotspots.style.opacity = '1';
      }
      
      if (img.complete && img.naturalHeight !== 0) {
        requestAnimationFrame(revealImage);
      } else {
        img.addEventListener('load', function onLoad() {
          img.removeEventListener('load', onLoad);
          requestAnimationFrame(revealImage);
        });
      }
    });
  </script>
</body>
</html>
