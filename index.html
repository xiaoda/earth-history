﻿﻿<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>地球历史</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="image-page" aria-label="地球历史">
    <div class="image-stage" id="mainStage">
      <picture>
        <source srcset="images/optimized/earth.webp" type="image/webp" />
        <img 
          src="images/optimized/earth.jpg" 
          alt="地球历史时间轴总览"
          loading="eager"
          decoding="async"
          fetchpriority="high"
        />
      </picture>
      <svg class="hotspots" viewBox="0 0 1672 941" aria-label="地球历史页面链接" style="opacity:0; transition: opacity 0.15s ease-out;">
        <a href="pages/hadean.html" aria-label="进入冥古宙页面">
          <rect x="88" y="145" width="165" height="49" />
        </a>
        <a href="pages/archean.html" aria-label="进入太古宙页面">
          <rect x="254" y="145" width="344" height="49" />
        </a>
        <a href="pages/proterozoic.html" aria-label="进入元古宙页面">
          <rect x="599" y="145" width="387" height="49" />
        </a>
        <a href="pages/phanerozoic.html" aria-label="进入显生宙页面">
          <rect x="986" y="145" width="676" height="49" />
        </a>
        <a href="pages/paleozoic.html" aria-label="进入古生代页面">
          <rect x="904" y="198" width="320" height="34" />
        </a>
        <a href="pages/mesozoic.html" aria-label="进入中生代页面">
          <rect x="1224" y="198" width="266" height="34" />
        </a>
        <a href="pages/cenozoic.html" aria-label="进入新生代页面">
          <rect x="1490" y="198" width="172" height="34" />
        </a>
        <a href="pages/atmospheric-evolution.html" aria-label="进入大气演化页面">
          <rect x="293" y="577" width="230" height="316" />
        </a>
        <a href="pages/ocean-and-continental-evolution.html" aria-label="进入海洋与大陆演化页面">
          <rect x="529" y="577" width="198" height="316" />
        </a>
      </svg>
    </div>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const stage = document.getElementById('mainStage');
      const img = stage.querySelector('img');
      const hotspots = stage.querySelector('.hotspots');
      
      function revealImage() {
        img.classList.add('loaded');
        stage.classList.add('loaded');
        if (hotspots) {
          hotspots.style.opacity = '1';
        }
      }
      
      if (img.complete && img.naturalHeight !== 0) {
        requestAnimationFrame(revealImage);
      } else {
        img.addEventListener('load', function onLoad() {
          img.removeEventListener('load', onLoad);
          requestAnimationFrame(revealImage);
        });
      }
    });
  </script>
</body>
</html>
